{% extends 'base.html' %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}

<h3>{{ titulo }}</h3>

<form method="post">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Nome</label>
        <input type="text" name="nome_completo" class="form-control" value="{{ paciente.nome_completo }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">CPF</label>
        <input type="text" name="cpf" class="form-control" value="{{ paciente.cpf }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">E-mail</label>
        <input type="email" name="email" class="form-control" value="{{ paciente.usuario.email }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Data de Nascimento</label>
        <input type="date" name="data_nascimento" class="form-control" value="{{ paciente.data_nascimento|date:'Y-m-d' }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Telefone</label>
        <input type="text" name="telefone" class="form-control" value="{{ paciente.telefone }}">
    </div>

    {% if paciente%}
        <div class="form-check mb-3">
        <input
            type="checkbox"
            name="ativo"
            class="form-check-input"
            id="ativo"
            {% if paciente.ativo %}checked{% endif %}
        >
        <label class="form-check-label" for="ativo">
            Paciente ativo
        </label>
    </div>
    {% endif %}

    <button class="btn btn-success">Salvar</button>
    <a href="{% url 'pacientes_lista' %}" class="btn btn-secondary">Cancelar</a>

</form>

{% endblock %}
